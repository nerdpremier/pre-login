<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MFA Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <h2>🛡️ ยืนยันตัวตน</h2>
        <p>กรุณากรอกรหัส 6 หลักจากอีเมลของคุณ</p>
        <div id="status-box" style="display:none; padding:10px; border-radius:8px; margin-bottom:15px;"></div>
        <input type="text" id="mfa-code" placeholder="000000" maxlength="6" style="text-align:center; font-size:24px; letter-spacing:10px;">
        <button onclick="verifyMFA()" class="btn-primary">ยืนยันรหัส</button>
    </div>
    <script>
        async function verifyMFA() {
            const code = document.getElementById('mfa-code').value;
            const logId = new URLSearchParams(window.location.search).get('logId');
            
            // ส่งไปเช็คที่ API (คุณต้องสร้าง api/verify-mfa.js เพิ่ม)
            const res = await fetch('/api/verify-mfa', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ logId, code })
            });

            if (res.ok) {
                alert("✅ ยืนยันสำเร็จ!");
                window.location.href = 'welcome.html';
            } else {
                alert("❌ รหัสไม่ถูกต้อง");
            }
        }
    </script>
</body>
</html>
