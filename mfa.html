<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root { --primary: #3b82f6; --bg: #020617; --card: rgba(15, 23, 42, 0.9); }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at 50% -20%, #1e293b, var(--bg)); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #f8fafc; }
        .login-card { background: var(--card); backdrop-filter: blur(25px); border-radius: 32px; padding: 3.5rem 2.5rem; width: 100%; max-width: 420px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
        h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.75rem; }
        .subtitle { color: #94a3b8; font-size: 0.95rem; margin-bottom: 2.5rem; line-height: 1.6; }
        .input-group { text-align: left; margin-bottom: 2rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem; color: #94a3b8; text-align: center; }
        input { width: 100%; padding: 20px; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.03); color: var(--primary); font-size: 1.8rem; font-weight: 700; text-align: center; letter-spacing: 12px; box-sizing: border-box; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--primary); background: rgba(255, 255, 255, 0.07); }
        button { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); }
        button:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5); }
        #status-box { display: none; padding: 14px; border-radius: 14px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 600; }
        .footer { margin-top: 2.5rem; font-size: 0.9rem; color: #94a3b8; }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="font-size: 4rem; margin-bottom: 1.5rem; filter: drop-shadow(0 0 15px var(--primary));">🛡️</div>
        <h2>Verify It's You</h2>
        <p class="subtitle">A verification code has been sent to your email. Please check your inbox and enter the 6-digit code.</p>
        <div id="status-box"></div>
        <div class="input-group">
            <label>Verification Code</label>
            <input type="text" id="mfa-input" placeholder="000000" maxlength="6">
        </div>
        <button onclick="verifyMFA()">Verify & Unlock Access</button>
        <div class="footer">Didn't get a code? <a href="#" onclick="location.reload()">Resend Email</a></div>
    </div>
    <script>
        async function verifyMFA() {
            const logId = new URLSearchParams(window.location.search).get('logId');
            const code = document.getElementById('mfa-input').value;
            const box = document.getElementById('status-box');

            const res = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ logId, code })
            });

            box.style.display = 'block';
            if (res.ok) {
                box.innerText = "✅ Verified!"; box.style.color = "#4ade80";
                setTimeout(() => window.location.href = 'welcome.html', 1500);
            } else {
                box.innerText = "❌ Invalid Code"; box.style.color = "#f87171";
            }
        }
    </script>
</body>
</html>
