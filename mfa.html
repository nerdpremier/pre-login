<div class="login-card">
    <div style="font-size: 3.5rem; margin-bottom: 1.5rem; filter: drop-shadow(0 0 10px var(--primary));">🛡️</div>
    <h2>Verify It's You</h2>
    <p class="subtitle">A 6-digit verification code has been sent to your registered email. It expires in 10 minutes.</p>
    
    <div id="status-box" class="status-box"></div>

    <div class="input-group">
        <label style="text-align: center;">Verification Code</label>
        <input type="text" id="mfa-input" placeholder="000 000" maxlength="6" 
               style="text-align:center; letter-spacing: 12px; font-size: 1.5rem; font-weight: 700; padding: 18px;">
    </div>

    <button onclick="verifyMFA()">Verify & Unlock Access</button>
    
    <div class="footer">
        Didn't receive a code? <a href="#" onclick="location.reload()">Resend Email</a>
    </div>
</div>
