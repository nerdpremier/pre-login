<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Login | Secure Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="header"><h1>Welcome Back</h1><p>Risk-based Login</p></div>
            <div id="status-box"></div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button onclick="preLoginCheck()">Sign In</button>
            <a href="register.html" class="link-text">Don't have an account? Register</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
