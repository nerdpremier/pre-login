<div class="login-card">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Enter your credentials to access your secure dashboard.</p>
    
    <div id="status-box" class="status-box"></div>

    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button onclick="preLoginCheck()">Sign In to Account</button>
    
    <div class="footer">
        New to our platform? <a href="register.html">Create an account</a>
    </div>
</div>
