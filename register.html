<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Security System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <h2>สมัครสมาชิก</h2>
        <div id="status-box" style="display:none; padding:10px; border-radius:8px; margin-bottom:15px; font-size:14px;"></div>
        <input type="text" id="username" placeholder="สร้าง Username">
        <input type="email" id="email" placeholder="Email สำหรับรับรหัส MFA">
        <input type="password" id="password" placeholder="สร้าง Password">
        <button onclick="handleRegister()" class="btn-primary">สมัครสมาชิก</button>
        <p><a href="index.html">กลับไปหน้าล็อกอิน</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
