<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Secure System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <h2>สมัครสมาชิก</h2>
        <div id="status-box" class="status-box"></div>
        <input type="text" id="username" placeholder="สร้าง Username (A-Z, 0-9)">
        <input type="email" id="email" placeholder="Email (สำหรับรับรหัส MFA)">
        <input type="password" id="password" placeholder="สร้าง Password">
        <p style="font-size: 11px; color: #94a3b8; text-align: left; margin-top: -10px; margin-bottom: 15px;">
            * รหัสผ่านต้องมี 8+ ตัวอักษร, พิมพ์ใหญ่, พิมพ์เล็ก, ตัวเลข และสัญลักษณ์ (@$!%*?&)
        </p>
        <button onclick="handleRegister()" class="btn-primary">สมัครสมาชิก</button>
        <p><a href="index.html">กลับไปหน้าล็อกอิน</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
