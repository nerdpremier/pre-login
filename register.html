<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root { --primary: #3b82f6; --bg: #020617; --card: rgba(15, 23, 42, 0.9); }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at 50% -20%, #1e293b, var(--bg)); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #f8fafc; overflow: hidden; }
        .login-card { background: var(--card); backdrop-filter: blur(20px); border-radius: 32px; padding: 3rem 2.5rem; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        h2 { font-size: 2rem; margin: 0.5rem 0; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .subtitle { color: #94a3b8; font-size: 0.95rem; margin-bottom: 2rem; }
        .input-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin: 0 0 0.5rem 0.5rem; font-weight: 600; }
        input { width: 100%; padding: 14px 20px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.03); color: white; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--primary); background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }
        button { width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4); }
        .status-box { display: none; padding: 14px; border-radius: 14px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 600; border: 1px solid rgba(255, 255, 255, 0.1); }
        .footer { margin-top: 2rem; font-size: 0.9rem; color: #94a3b8; }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🚀</div>
        <h2>Get Started</h2>
        <p class="subtitle">Create a secure English-only account.</p>
        <div id="status-box" class="status-box"></div>
        <div class="input-group"><label>Username</label><input type="text" id="username" placeholder="A-Z, 0-9"></div>
        <div class="input-group"><label>Email</label><input type="email" id="email" placeholder="name@example.com"></div>
        <div class="input-group"><label>Password</label><input type="password" id="password" placeholder="8+ characters"></div>
        <button onclick="handleRegister()">Register Account</button>
        <div class="footer">Already have an account? <a href="index.html">Sign In</a></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
